<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Activity</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 16px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    hr {
      border: none;
      border-top: 1px solid #e3e3e3;
      margin: 24px 0;
    }

    .note {
      font-size: 0.98rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>GitHub Pages is working</h1>
    <p>Your site is live.</p>
    <p>
      This file is now clean and has no Netlify references, no Netlify links,
      and no Netlify placeholder content.
    </p>
    <hr />
    <p class="note">
      Next step: replace this section with your real interactive HTML, CSS, and
      JavaScript.
    </p>
  </div>
</body>
</html>
